<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="icon/printer-svgrepo-com.svg">
    <link rel="stylesheet" href="styles/styles.css">
    <title>Printer Manager</title>
    <script src="scripts/script.js" defer></script>
</head>
    <body>
        <nav>
            <div class="title-con">
                <h1>
                    Printer Management
                </h1>
            </div>
            <div id="location-row-con">
                <div class="location-row">
                    <h2>Loading locations...</h2>
                </div>
            </div>
            <div class="mobile-location-con">
                <span class="mobile-location-label">Location</span>
                <button id="mobile-location-button" class="mobile-location-button" type="button" aria-expanded="false" aria-controls="mobile-location-menu" onclick="toggleMobileLocationMenu()">
                    Loading locations...
                </button>
                <div id="mobile-location-menu" class="mobile-location-menu" hidden></div>
            </div>
            <div class="location-row add-location-con">
                <button id="add-location-button" type="button" class="btn btn-success" title="Add location" onclick="renderLocationForm()">
                    <h2><i class="fa-solid fa-plus"></i></h2>
                </button>

            </div>


        </nav>
        <div id="main-con">
            <div id="vendor-nav">
                <div>
                    <h1 id="vendor-title">Vendor: Loading...</h1>
                    <div class="header-actions">
                        <button id="add-driver-button" type="button" class="btn btn-success" title="Add driver" onclick="renderDriverFormWithError()">
                            <h2><i class="fa-solid fa-file-arrow-up"></i></h2>
                        </button>
                        <button id="dark-mode-button" type="button" class="btn btn-primary" title="Toggle dark mode" onclick="toggleDarkMode()">
                            <i class="fa-solid fa-moon"></i>
                        </button>
                        <button id="add-printer-button" type="button" class="btn btn-warning" title="Add printer" onclick="renderForm()">
                            <h2><i class="fa-solid fa-plus"></i></h2>
                        </button>
                    </div>
                </div>
            </div>
            <div id="content-con">
                <div id="table-con">
                </div>
            </div>
        </div>
    </body>
</html>
